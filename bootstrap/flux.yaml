---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.45.1
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - events: ["preuninstall"]
        command: bash
        args:
          - -c
          - |
            kubectl delete fluxinstance --all -A --ignore-not-found=true
            kubectl wait --for=delete fluxinstance --all -A --timeout=60s || true

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.45.1
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator

  - name: tofu-controller
    namespace: flux-system
    chart: oci://ghcr.io/flux-iac/charts/tofu-controller
    version: 0.16.1
    values:
        - ./templates/values.yaml.gotmpl
    hooks:
      - command: bash
        args:
          - -c
          - |
            until kubectl get crd ocirepositories.source.toolkit.fluxcd.io &>/dev/null; do
              echo "Waiting for Flux CRDs..."
              sleep 5
            done
        events:
          - presync
        showlogs: true
    needs:
      - flux-system/flux-instance